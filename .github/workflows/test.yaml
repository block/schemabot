name: "Tests"
on:
  push:
    tags:
      - v*
    branches:
      - master
      - main
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
env:
  # Only save caches on pushes to protected branches (prevents cache poisoning from fork PRs).
  SAVE_CACHE: ${{ github.event_name == 'push' }}
jobs:
  build:
    name: "Build"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Build"
        run: go build -v ./...
      - name: "Vet (all tags)"
        run: |
          go vet ./...
          go vet -tags=integration ./...
          go vet -tags=e2e ./e2e/...
      - name: "Save Go cache"
        if: env.SAVE_CACHE == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/save@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}

  unit:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Test"
        run: make test-unit

  integration:
    name: "Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Test"
        run: go test -tags=integration -timeout=10m -count=1 $(go list -tags=integration ./... | grep -v /localscale)

  localscale:
    name: "LocalScale Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Restore LocalScale binaries"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            bin/vtcombo-linux
            bin/mysqlctl-linux
            bin/localscale-linux
          key: localscale-bins-${{ hashFiles('go.sum', 'cmd/localscale/**', 'pkg/localscale/**') }}
          restore-keys: localscale-bins-
      - name: "Build LocalScale image"
        run: |
          [ -f bin/localscale-linux ] || CGO_ENABLED=0 GOOS=linux go build -o bin/localscale-linux ./cmd/localscale &
          [ -f bin/vtcombo-linux ] || CGO_ENABLED=0 GOOS=linux go build -o bin/vtcombo-linux vitess.io/vitess/go/cmd/vtcombo &
          [ -f bin/mysqlctl-linux ] || CGO_ENABLED=0 GOOS=linux go build -o bin/mysqlctl-linux vitess.io/vitess/go/cmd/mysqlctl &
          wait
          scripts/copy-vitess-config.sh
          docker build -f deploy/local/Dockerfile.localscale -t localscale:latest .
      - name: "Save LocalScale binaries"
        if: env.SAVE_CACHE == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/save@v4
        with:
          path: |
            bin/vtcombo-linux
            bin/mysqlctl-linux
            bin/localscale-linux
          key: localscale-bins-${{ hashFiles('go.sum', 'cmd/localscale/**', 'pkg/localscale/**') }}
      - name: "Test"
        run: go test -tags=integration -timeout=8m -count=1 -v ./pkg/localscale/... 2>&1 | tee /dev/stderr | tail -50

  e2e-mysql:
    name: "E2E MySQL Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Restore app binaries"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            bin/schemabot-linux
            bin/localscale-linux
          key: app-bins-${{ runner.os }}-${{ hashFiles('go.sum', 'pkg/**/*.go', 'cmd/**/*.go', 'internal/**/*.go') }}
      - name: "Test"
        run: make test-e2e-mysql test-e2e-grpc
      - name: "Container logs on failure"
        if: failure()
        run: docker compose -f deploy/e2e/docker-compose.yml logs --tail=100 2>/dev/null || true

  e2e-vitess-matrix:
    name: "E2E Vitess Matrix"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      shards: ${{ steps.gen.outputs.shards }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Generate shard matrix"
        id: gen
        run: |
          NUM_SHARDS=2
          # Extract all TestVitess_ function names and split evenly across shards
          tests=$(grep -o 'func TestVitess_[^(]*' e2e/local/vitess_test.go | sed 's/func //' | shuf)
          shards=$(echo "$tests" | awk -v n="$NUM_SHARDS" '
            { bucket[NR % n] = bucket[NR % n] (bucket[NR % n] ? "|" : "") $0 }
            END { for (i=0; i<n; i++) printf "{\"shard\":\"%d\",\"run_filter\":\"%s\"}\n", i+1, bucket[i] }
          ' | jq -cs '.')
          echo "shards=$shards" >> "$GITHUB_OUTPUT"
          echo "Generated $NUM_SHARDS shards from $(echo "$tests" | wc -l) tests"

  e2e-vitess:
    name: "E2E Vitess Tests (${{ matrix.shard }})"
    needs: e2e-vitess-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.e2e-vitess-matrix.outputs.shards) }}
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # actions/checkout@v6
      - name: "Configure Go"
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # actions/setup-go@v6.1
        with:
          go-version-file: go.mod
          cache: false
      - name: "Restore Go cache"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: go-${{ runner.os }}-${{ hashFiles('go.sum') }}
          restore-keys: go-${{ runner.os }}-
      - name: "Restore Vitess binaries"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            bin/vtcombo-linux
            bin/mysqlctl-linux
          key: vitess-bins-${{ hashFiles('go.sum') }}
      - name: "Restore app binaries"
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/restore@v4
        with:
          path: |
            bin/schemabot-linux
            bin/localscale-linux
          key: app-bins-${{ runner.os }}-${{ hashFiles('go.sum', 'pkg/**/*.go', 'cmd/**/*.go', 'internal/**/*.go') }}
      - name: "Test"
        run: make test-e2e-local RUN="${{ matrix.run_filter }}"
      - name: "Container logs on failure"
        if: failure()
        run: docker compose -f deploy/e2e/docker-compose.yml logs --tail=100 2>/dev/null || true
      - name: "Save Vitess binaries"
        if: env.SAVE_CACHE == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/save@v4
        with:
          path: |
            bin/vtcombo-linux
            bin/mysqlctl-linux
          key: vitess-bins-${{ hashFiles('go.sum') }}
      - name: "Save app binaries"
        if: env.SAVE_CACHE == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # actions/cache/save@v4
        with:
          path: |
            bin/schemabot-linux
            bin/localscale-linux
          key: app-bins-${{ runner.os }}-${{ hashFiles('go.sum', 'pkg/**/*.go', 'cmd/**/*.go', 'internal/**/*.go') }}
