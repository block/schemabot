# SchemaBot Configuration (Local Mode)
#
# This is the default configuration for SchemaBot with embedded Tern.
# No external Tern services are needed - everything runs in a single process.
#
# For gRPC mode (separate Tern services), add tern_deployments section.
# See config/schemabot.yaml for an example.

# SchemaBot's own storage database
storage:
  dsn: "env:MYSQL_DSN"

# Database configurations (source of truth)
# In local mode, SchemaBot uses embedded Tern to manage these databases.
# Staging and production use separate MySQL instances (different hosts),
# both with the same database name (testapp).
databases:
  testapp:
    type: mysql
    environments:
      staging:
        dsn: "root:testpassword@tcp(mysql-staging:3306)/testapp?parseTime=true"
      production:
        dsn: "root:testpassword@tcp(mysql-production:3306)/testapp?parseTime=true"

  # Vitess database via LocalScale (PlanetScale-compatible API backed by real Vitess).
  # Requires LocalScale container running (make demo-vitess).
  testapp-vitess:
    type: vitess
    environments:
      staging:
        dsn: "root@tcp(localscale:19101)/"
        api_url: "http://localscale:8080"
        organization: "localscale-staging"
        token_secret_ref: "env:PS_TOKEN"
      api-plan:
        dsn: "root@tcp(127.0.0.1:1)/"
        api_url: "http://localscale:8080"
        organization: "localscale-staging"
        token_secret_ref: "env:PS_TOKEN"
      production:
        dsn: "root@tcp(localscale:19100)/"
        api_url: "http://localscale:8080"
        organization: "localscale-production"
        token_secret_ref: "env:PS_TOKEN"
