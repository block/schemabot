# E2E Testing: SchemaBot with embedded Tern (local mode).
#
# This is a dedicated docker-compose for e2e tests, isolated from the demo
# environment at deploy/local/. Uses hardcoded e2e ports and faster LocalScale
# delays for quick test execution.
#
# Ports:
#   SchemaBot API:     http://localhost:14370
#   SchemaBot MySQL:   localhost:14371 (schemabot storage)
#   Staging MySQL:     localhost:14372 (testapp database)
#   Production MySQL:  localhost:14373 (testapp database)
#   LocalScale API:    http://localhost:14374
#   Branch Proxies:    localhost:19100-19199 (vtgate MySQL via branch passwords)
name: schemabot-e2e

services:
  # SchemaBot's internal storage database
  mysql-schemabot:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: schemabot
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "14371:3306"
    volumes:
      - mysql-schemabot-data:/var/lib/mysql
      - ../local/mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Staging MySQL instance
  mysql-staging:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "14372:3306"
    volumes:
      - mysql-staging-data:/var/lib/mysql
      - ../local/mysql-init:/docker-entrypoint-initdb.d:ro
      - ../local/mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Production MySQL instance
  mysql-production:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "14373:3306"
    volumes:
      - mysql-production-data:/var/lib/mysql
      - ../local/mysql-init:/docker-entrypoint-initdb.d:ro
      - ../local/mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # LocalScale: fake PlanetScale API with managed Vitess (vtcombo) inside.
  # Uses e2e config with faster delays (50ms instead of 1s).
  localscale:
    image: localscale:latest
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile.localscale
    environment:
      CONFIG_FILE: "/config/localscale-e2e.json"
    volumes:
      - ./config:/config:ro
      - localscale-data:/vt/vtdataroot
    ports:
      - "14374:8080"
      - "19100-19199:19100-19199"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  schemabot:
    build:
      context: ../local
      dockerfile: Dockerfile.dev
    environment:
      MYSQL_DSN: "root:testpassword@tcp(mysql-schemabot:3306)/schemabot?parseTime=true&multiStatements=true"
      SCHEMABOT_CONFIG_FILE: "/config/local.yaml"
      PS_TOKEN: "localscale:localscale"
      PORT: "8080"
      LOG_LEVEL: "debug"
    volumes:
      - ./config:/config:ro
    ports:
      - "14370:8080"
    depends_on:
      mysql-schemabot:
        condition: service_healthy
      mysql-staging:
        condition: service_healthy
      mysql-production:
        condition: service_healthy
      localscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-schemabot-data:
  mysql-staging-data:
  mysql-production-data:
  localscale-data:
