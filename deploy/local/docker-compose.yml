# Local Development: SchemaBot with embedded Tern (local mode).
#
# Usage:
#   make up         # Start services
#   make up FRESH=1 # Start fresh (reinitialize databases)
#   make down       # Stop
#   make logs       # View logs
#
# OIDC Authentication (opt-in):
#   docker compose --profile oidc up
#   See docs/configuration.md for test credentials and token helper script.
#
# Endpoints:
#   SchemaBot API:     http://localhost:13370
#   SchemaBot (OIDC):  http://localhost:13380 (--profile oidc)
#   SchemaBot MySQL:   localhost:13371 (schemabot storage)
#   Staging MySQL:     localhost:13372 (testapp database)
#   Production MySQL:  localhost:13373 (testapp database)
#   LocalScale API:    http://localhost:13374
#   Dex OIDC:          http://localhost:5556 (--profile oidc)
#   Branch Proxies:    localhost:19100-19199 (vtgate MySQL via branch passwords)
#
# For gRPC mode with separate Tern services, see docker-compose.grpc.yml.
name: schemabot

services:
  # SchemaBot's internal storage database
  # Note: Schema is applied by SchemaBot on startup via Spirit
  mysql-schemabot:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: schemabot
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "${SCHEMABOT_MYSQL_PORT:-13371}:3306"
    volumes:
      - mysql-schemabot-data:/var/lib/mysql
      - ./mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Staging MySQL instance (migration target)
  # Demonstrates separate MySQL instances for staging/production
  mysql-staging:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "${STAGING_MYSQL_PORT:-13372}:3306"
    volumes:
      - mysql-staging-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Production MySQL instance (migration target)
  mysql-production:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_INITDB_SKIP_TZINFO: "1"
    ports:
      - "${PRODUCTION_MYSQL_PORT:-13373}:3306"
    volumes:
      - mysql-production-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
      - ./mysql-init/mysql-config/my.cnf:/etc/mysql/conf.d/schemabot.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ptestpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

  # LocalScale: fake PlanetScale API with managed Vitess (vtcombo) inside.
  # Two orgs (staging + production), each with testapp + testapp_sharded keyspaces.
  # No external vttestserver or MySQL needed — everything runs in-process.
  localscale:
    image: localscale:latest
    build:
      context: ../..
      dockerfile: deploy/local/Dockerfile.localscale
    environment:
      CONFIG_FILE: "/config/localscale.json"
    volumes:
      - ./config:/config:ro
      - localscale-data:/vt/vtdataroot
    ports:
      - "${LOCALSCALE_PORT:-13374}:8080"
      - "19100-19199:19100-19199"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  schemabot:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      MYSQL_DSN: "root:testpassword@tcp(mysql-schemabot:3306)/schemabot?parseTime=true&multiStatements=true"
      SCHEMABOT_CONFIG_FILE: "/config/local.yaml"
      PS_TOKEN: "localscale:localscale"
      PORT: "8080"
      LOG_LEVEL: "debug"
    volumes:
      - ./config:/config:ro
    ports:
      - "${SCHEMABOT_PORT:-13370}:8080"
    depends_on:
      mysql-schemabot:
        condition: service_healthy
      mysql-staging:
        condition: service_healthy
      mysql-production:
        condition: service_healthy
      localscale:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dex OIDC provider for local authentication testing.
  # Only starts with: docker compose --profile oidc up
  # Provides a local OIDC issuer with static test users.
  # See config/dex.yaml for test credentials.
  dex:
    image: ghcr.io/dexidp/dex:latest
    profiles: ["oidc"]
    ports:
      - "${DEX_PORT:-5556}:5556"
    volumes:
      - ./config/dex.yaml:/etc/dex/config.yaml:ro
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5556/dex/.well-known/openid-configuration"]
      interval: 5s
      timeout: 5s
      retries: 10

  # SchemaBot with OIDC authentication enabled (uses local Dex).
  # Only starts with: docker compose --profile oidc up
  # Replaces the default schemabot service when testing auth.
  schemabot-oidc:
    build:
      context: .
      dockerfile: Dockerfile.dev
    profiles: ["oidc"]
    environment:
      MYSQL_DSN: "root:testpassword@tcp(mysql-schemabot:3306)/schemabot?parseTime=true&multiStatements=true"
      SCHEMABOT_CONFIG_FILE: "/config/local-oidc.yaml"
      PS_TOKEN: "localscale:localscale"
      PORT: "8080"
      LOG_LEVEL: "debug"
    volumes:
      - ./config:/config:ro
    ports:
      - "${SCHEMABOT_OIDC_PORT:-13380}:8080"
    depends_on:
      mysql-schemabot:
        condition: service_healthy
      mysql-staging:
        condition: service_healthy
      mysql-production:
        condition: service_healthy
      localscale:
        condition: service_healthy
      dex:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-schemabot-data:
  mysql-staging-data:
  mysql-production-data:
  localscale-data:
