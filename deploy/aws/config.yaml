# AWS Example Deployment Configuration
#
# This config is used when deploying SchemaBot to AWS App Runner.
# Secrets are resolved from AWS Secrets Manager at startup.
# If you update a secret value, you must restart the service to pick it up.
#
# Secret names are created by Terraform in deploy/aws/:
#   - schemabot-example/storage-dsn
#   - schemabot-example/testapp-staging
#   - schemabot-example/testapp-production
#   - schemabot-example/github-app
#
# Additional databases created by setup-multi-db.sh:
#   - schemabot-example/payments-staging
#   - schemabot-example/payments-production
#   - schemabot-example/orders-staging
#   - schemabot-example/orders-production
#   - schemabot-example/inventory-staging
#   - schemabot-example/inventory-production

storage:
  dsn: "secretsmanager:schemabot-example/storage-dsn#dsn"

# GitHub App integration (webhook-driven schema changes via PR comments).
# All credentials are stored in Secrets Manager by setup-github-app.sh.
github:
  app_id: "secretsmanager:schemabot-example/github-app#app_id"
  private_key: "secretsmanager:schemabot-example/github-app#private_key"
  webhook_secret: "secretsmanager:schemabot-example/github-app#webhook_secret"

databases:
  testapp:
    type: mysql
    environments:
      staging:
        dsn: "secretsmanager:schemabot-example/testapp-staging#dsn"
      production:
        dsn: "secretsmanager:schemabot-example/testapp-production#dsn"
  payments:
    type: mysql
    environments:
      staging:
        dsn: "secretsmanager:schemabot-example/payments-staging#dsn"
      production:
        dsn: "secretsmanager:schemabot-example/payments-production#dsn"
  orders:
    type: mysql
    environments:
      staging:
        dsn: "secretsmanager:schemabot-example/orders-staging#dsn"
      production:
        dsn: "secretsmanager:schemabot-example/orders-production#dsn"
  inventory:
    type: mysql
    environments:
      staging:
        dsn: "secretsmanager:schemabot-example/inventory-staging#dsn"
      production:
        dsn: "secretsmanager:schemabot-example/inventory-production#dsn"
