version: 2

builds:
  - id: schemabot
    main: ./pkg/cmd
    binary: schemabot
    env:
      - CGO_ENABLED=0
    ldflags:
      - -X main.version={{.Tag}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: darwin
        goarch: amd64

archives:
  - id: schemabot
    builds:
      - schemabot
    format: tar.gz
    name_template: "schemabot_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
